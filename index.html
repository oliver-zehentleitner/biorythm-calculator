<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biorhythm Calculator</title>
    <style>
        :root {
            --color-bg: #f4f1ea;
            --color-surface: #ffffff;
            --color-text: #1a1a1a;
            --color-text-muted: #555;
            --color-border: #c9c4b7;
            --color-border-focus: #1a1a1a;
            --color-physical: #1f7a32;
            --color-emotional: #1455a0;
            --color-intellectual: #b0201f;
            --color-button: #1a1a1a;
            --color-button-text: #ffffff;
            --radius: 14px;
            --shadow: 0 2px 10px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            font-size: 20px;
            line-height: 1.5;
        }

        .page {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 24px 60px;
        }

        h1 {
            font-size: 2.4em;
            margin: 0 0 28px;
            text-align: center;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow);
            margin-bottom: 28px;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 20px;
            margin-bottom: 20px;
        }
        .form-row:last-of-type { margin-bottom: 0; }

        label {
            flex: 0 0 280px;
            font-weight: 600;
            font-size: 1.05em;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"] {
            flex: 1 1 240px;
            min-width: 0;
            font-size: 1.25em;
            padding: 16px 18px;
            border: 2px solid var(--color-border);
            border-radius: 12px;
            background: #fff;
            color: var(--color-text);
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--color-border-focus);
            box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
        }

        .cycles-section {
            margin-top: 8px;
            padding-top: 24px;
            border-top: 1px dashed var(--color-border);
        }
        .cycles-section .form-row input[type="number"] {
            flex: 0 0 140px;
            max-width: 140px;
        }
        .cycles-section .physical-label { color: var(--color-physical); }
        .cycles-section .emotional-label { color: var(--color-emotional); }
        .cycles-section .intellectual-label { color: var(--color-intellectual); }

        button.primary {
            display: block;
            width: 100%;
            padding: 22px;
            font-size: 1.35em;
            font-weight: 700;
            background: var(--color-button);
            color: var(--color-button-text);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            margin-top: 28px;
            letter-spacing: 0.01em;
        }
        button.primary:hover { background: #000; }
        button.primary:active { transform: scale(0.99); }

        .result-title {
            font-size: 1.7em;
            margin: 0 0 24px;
            text-align: center;
            font-weight: 700;
        }

        .rhythms {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin-bottom: 28px;
        }

        .rhythm {
            border: 2px solid currentColor;
            border-radius: var(--radius);
            padding: 22px 16px;
            text-align: center;
            background: #fff;
        }
        .rhythm.physical { color: var(--color-physical); }
        .rhythm.emotional { color: var(--color-emotional); }
        .rhythm.intellectual { color: var(--color-intellectual); }

        .rhythm .rhythm-name {
            font-weight: 700;
            font-size: 1.1em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .rhythm .value {
            font-size: 2.6em;
            font-weight: 800;
            line-height: 1;
            margin: 10px 0 6px;
        }
        .rhythm .trend {
            font-size: 1em;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--color-text-muted);
        }
        .rhythm .day-of-cycle {
            font-size: 0.95em;
            color: var(--color-text-muted);
        }

        .days-passed {
            text-align: center;
            font-size: 1.05em;
            color: var(--color-text-muted);
            margin: 0 0 24px;
        }

        .chart-wrap {
            width: 100%;
            height: 360px;
            position: relative;
        }

        .languages {
            text-align: center;
            padding: 20px 0;
            color: var(--color-text-muted);
            font-size: 0.95em;
        }
        .languages a {
            color: var(--color-text-muted);
            margin: 0 6px;
            text-decoration: none;
            border-bottom: 1px dotted currentColor;
        }
        .languages a:hover { color: var(--color-text); }

        .hidden { display: none; }

        @media (max-width: 760px) {
            html, body { font-size: 18px; }
            .page { padding: 24px 16px 40px; }
            .card { padding: 22px; }
            h1 { font-size: 2em; }
            label { flex-basis: 100%; }
            .cycles-section .form-row input[type="number"] { flex: 1 1 100%; max-width: none; }
            .rhythms { grid-template-columns: 1fr; }
            .chart-wrap { height: 280px; }
        }
    </style>
    <link rel="shortcut icon" type="image/x-icon" href="https://oliver-zehentleitner.github.io/biorythm-calculator/favicon.ico">

</head>

    <div class="page">
        <h1 id="pageTitle">Biorhythm Calculator</h1>

        <div class="card">
            <div class="form-row">
                <label for="personName" id="nameLabel">Name:</label>
                <input type="text" id="personName" autocomplete="name">
            </div>
            <div class="form-row">
                <label for="birthdate" id="birthdateLabel">Birthdate:</label>
                <input type="date" id="birthdate" required>
            </div>
            <div class="form-row">
                <label for="eventdate" id="eventdateLabel">Event Date:</label>
                <input type="date" id="eventdate" required>
            </div>

            <div class="cycles-section">
                <div class="form-row">
                    <label for="physicalCycle" class="physical-label" id="physicalCycleLabel">Physical Cycle (Default 23):</label>
                    <input type="number" id="physicalCycle" value="23" min="1">
                </div>
                <div class="form-row">
                    <label for="emotionalCycle" class="emotional-label" id="emotionalCycleLabel">Emotional Cycle (Default 28):</label>
                    <input type="number" id="emotionalCycle" value="28" min="1">
                </div>
                <div class="form-row">
                    <label for="intellectualCycle" class="intellectual-label" id="intellectualCycleLabel">Intellectual Cycle (Default 33):</label>
                    <input type="number" id="intellectualCycle" value="33" min="1">
                </div>
            </div>

            <button class="primary" id="calcButton" onclick="calculateBiorythms()">Calculate</button>
        </div>

        <div class="card hidden" id="resultCard">
            <h2 class="result-title" id="resultTitle">Result</h2>
            <div class="rhythms" id="rhythms"></div>
            <p class="days-passed" id="daysPassed"></p>
            <div class="chart-wrap">
                <canvas id="biorythmChart"></canvas>
            </div>
        </div>

        <p class="languages">Languages:
            <a href="?lang=de">DE</a>
            <a href="?lang=en">EN</a>
            <a href="?lang=es">ES</a>
            <a href="?lang=fr">FR</a>
            <a href="?lang=hi">HI</a>

            <a href="?lang=nl">NL</a>
            <a href="?lang=ru">RU</a>
            <a href="?lang=zh">ZH</a>
        </p>
    </div>

        function getUrlParameter(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        const urlLang = getUrlParameter('lang');
        const userLang = navigator.language.slice(0, 2);
        const lang = translations[urlLang] ? urlLang : (translations[userLang] ? userLang : 'en');
        const t = translations[lang];

        document.documentElement.lang = lang;
        document.title = t.title;
        document.getElementById('pageTitle').textContent = t.title;
        document.getElementById('nameLabel').textContent = t.name;
        document.getElementById('birthdateLabel').textContent = t.birthdate;
        document.getElementById('eventdateLabel').textContent = t.eventdate;
        document.getElementById('physicalCycleLabel').textContent = t.physicalCycle;
        document.getElementById('emotionalCycleLabel').textContent = t.emotionalCycle;
        document.getElementById('intellectualCycleLabel').textContent = t.intellectualCycle;
        document.getElementById('calcButton').textContent = t.button;

        const STORAGE_KEY = 'biorhythm-calc-v1';

        function saveState() {
            const state = {
                name: document.getElementById('personName').value,
                birthdate: document.getElementById('birthdate').value,
                physicalCycle: document.getElementById('physicalCycle').value,
                emotionalCycle: document.getElementById('emotionalCycle').value,
                intellectualCycle: document.getElementById('intellectualCycle').value
            };
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
        }

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const s = JSON.parse(raw);
                    if (s.name) document.getElementById('personName').value = s.name;
                    if (s.birthdate) document.getElementById('birthdate').value = s.birthdate;
                    if (s.physicalCycle) document.getElementById('physicalCycle').value = s.physicalCycle;
                    if (s.emotionalCycle) document.getElementById('emotionalCycle').value = s.emotionalCycle;
                    if (s.intellectualCycle) document.getElementById('intellectualCycle').value = s.intellectualCycle;
                }
            } catch (e) {}

            const eventInput = document.getElementById('eventdate');
            if (!eventInput.value) {
                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                eventInput.value = `${yyyy}-${mm}-${dd}`;
            }
        }

        loadState();

        let myChart;
        function calculateBiorythms() {
            const personName = document.getElementById('personName').value.trim();
            const birthdate = new Date(document.getElementById('birthdate').value);
            const eventdate = new Date(document.getElementById('eventdate').value);
            if (isNaN(birthdate) || isNaN(eventdate)) {
                alert(t.invalidDate);
                return;
            }

            saveState();

            const diffDays = Math.floor((eventdate - birthdate) / (1000 * 60 * 60 * 24));

            const physicalCycle = parseInt(document.getElementById('physicalCycle').value) || 23;
            const emotionalCycle = parseInt(document.getElementById('emotionalCycle').value) || 28;
            const intellectualCycle = parseInt(document.getElementById('intellectualCycle').value) || 33;

            function dayInCycle(days, cycle) {
                const r = days % cycle;
                return r < 0 ? r + cycle : r;
            }

            const cycles = [
                { key: 'physical', cycle: physicalCycle, cls: 'physical' },
                { key: 'emotional', cycle: emotionalCycle, cls: 'emotional' },
                { key: 'intellectual', cycle: intellectualCycle, cls: 'intellectual' }
            ];

            const rhythmsEl = document.getElementById('rhythms');
            rhythmsEl.innerHTML = '';
            cycles.forEach(c => {
                const value = Math.sin(2 * Math.PI * diffDays / c.cycle);
                const percent = Math.round(value * 100);
                const rising = Math.cos(2 * Math.PI * diffDays / c.cycle) > 0;
                const dayIdx = dayInCycle(diffDays, c.cycle);
                const sign = percent > 0 ? '+' : '';
                const card = document.createElement('div');
                card.className = `rhythm ${c.cls}`;
                card.innerHTML = `
                    <div class="rhythm-name">${t[c.key]}</div>
                    <div class="value">${sign}${percent}%</div>
                    <div class="trend">${rising ? t.rising : t.falling}</div>
                    <div class="day-of-cycle">${t.dayOfCycle.replace('{day}', dayIdx).replace('{cycle}', c.cycle)}</div>
                `;
                rhythmsEl.appendChild(card);
            });

            document.getElementById('resultTitle').textContent = personName
                ? t.resultFor.replace('{name}', personName)
                : t.resultTitle;

            document.getElementById('daysPassed').textContent =
                t.daysPassed.replace('{days}', diffDays);

            const ctx = document.getElementById('biorythmChart').getContext('2d');
            const days = [...Array(31).keys()];
            const physicalData = days.map(day => Math.sin(2 * Math.PI * (diffDays + day - 15) / physicalCycle));
            const emotionalData = days.map(day => Math.sin(2 * Math.PI * (diffDays + day - 15) / emotionalCycle));
            const intellectualData = days.map(day => Math.sin(2 * Math.PI * (diffDays + day - 15) / intellectualCycle));

            if (myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: days.map(d => d - 15),
                    datasets: [
                        {
                            label: t.chartLabels.physical,
                            data: physicalData,
                            borderColor: '#1f7a32',
                            backgroundColor: 'rgba(31,122,50,0.1)',
                            borderWidth: 3,
                            pointRadius: 0,
                            tension: 0.3,
                            fill: false
                        },
                        {
                            label: t.chartLabels.emotional,
                            data: emotionalData,
                            borderColor: '#1455a0',
                            backgroundColor: 'rgba(20,85,160,0.1)',
                            borderWidth: 3,
                            pointRadius: 0,
                            tension: 0.3,
                            fill: false
                        },
                        {
                            label: t.chartLabels.intellectual,
                            data: intellectualData,
                            borderColor: '#b0201f',
                            backgroundColor: 'rgba(176,32,31,0.1)',
                            borderWidth: 3,
                            pointRadius: 0,
                            tension: 0.3,
                            fill: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                font: { size: 14 },
                                padding: 16
                            }
                        },
                        annotation: {
                            annotations: {
                                line1: {
                                    type: 'line',
                                    xMin: 15,
                                    xMax: 15,
                                    borderColor: '#1a1a1a',
                                    borderWidth: 2,
                                    label: {
                                        content: t.chartLabels.eventdate,
                                        enabled: true,
                                        position: 'start'
                                    }
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            min: -1,
                            max: 1,
                            ticks: { font: { size: 13 } }
                        },
                        x: {
                            title: {
                                display: true,
                                text: t.chartLabels.xAxis,
                                font: { weight: '700', size: 14 }
                            },
                            ticks: { font: { size: 13 } }
                        }
                    }
                }
            });

            document.getElementById('resultCard').classList.remove('hidden');
            document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
</body>
</html>
